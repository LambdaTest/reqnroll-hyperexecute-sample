---
version: 0.1

runson: win

retryOnFailure: true
maxRetries: 1

autosplit: true

runtime:
  language: dotnet
  version: "8.0"

concurrency: 4

env:
  NUGET_PACKAGES: 'C:\nuget_global_cache'
  NUGET_HTTP_CACHE_PATH: 'C:\nuget_http_cache'
  NUGET_PLUGINS_CACHE_PATH: 'C:\nuget_plugins_cache'

pre:
 - dotnet build
 - dotnet --version
 
cacheKey: '{{ checksum "reqnroll.cloud.csproj" }}'

post:
  - cat yaml/win/reqnroll_hyperexecute_autosplit_sample.yaml

mergeArtifacts: true

uploadArtefacts:
 - name: Execution_Report
   path:
    - Report/**
    - Reports/**
 - name: Execution_Screenshots
   path:
    - Screenshots/**/**
    - Reports/**/Screenshots/**

report: true
partialReports:
  location: Report/
  type: html
  frameworkName: reqnroll
  
testDiscovery:
  type: raw
  mode: dynamic
  command: grep -rni 'Features' -e '@' --include=\*.feature | sed 's/.*@//'

testRunnerCommand: dotnet test --logger "console;verbosity=detailed" --filter "(Category=$test)"

jobLabel: [selenium-reqnroll, win, autosplit]