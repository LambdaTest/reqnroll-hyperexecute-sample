---
version: 0.1

runson: mac

retryOnFailure: true
maxRetries: 1

autosplit: true

runtime:
  language: dotnet
  version: "8.0"

concurrency: 4

env:
  NUGET_PACKAGES: '/Users/ltuser/.nuget/packages/'
  NUGET_HTTP_CACHE_PATH: '/Users/ltuser/.local/share/NuGet/v3-cache'
  NUGET_PLUGINS_CACHE_PATH: '/Users/ltuser/.local/share/NuGet/plugins-cache'

pre:
 - dotnet build
 - dotnet --version
 
cacheKey: '{{ checksum "reqnroll.cloud.csproj" }}'

post:
  - cat yaml/linux/reqnroll_hyperexecute_autosplit_sample.yaml

mergeArtifacts: true

uploadArtefacts:
 - name: Execution_Report
   path:
    - Report/**
    - Reports/**
 - name: Execution_Screenshots
   path:
    - Screenshots/**/**
    - Reports/**/Screenshots/**

report: true
partialReports:
  location: Report/
  type: html
  frameworkName: reqnroll
  
testDiscovery:
  type: raw
  mode: dynamic
  command: grep -rni 'Features' -e '@' --include=\*.feature | sed 's/.*@//'

testRunnerCommand: dotnet test --logger "console;verbosity=detailed" --filter "(Category=$test)"

jobLabel: [selenium-reqnroll, mac, autosplit]