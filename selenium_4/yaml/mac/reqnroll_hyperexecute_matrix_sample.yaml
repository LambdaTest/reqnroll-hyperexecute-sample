---
version: 0.1
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: mac

retryOnFailure: true
maxRetries: 1
concurrency: 4

runtime:
  language: dotnet
  version: "8.0"

env:
  NUGET_PACKAGES: '/Users/ltuser/.nuget/packages/'
  NUGET_HTTP_CACHE_PATH: '/Users/ltuser/.local/share/NuGet/v3-cache'
  NUGET_PLUGINS_CACHE_PATH: '/Users/ltuser/.local/share/NuGet/plugins-cache'

matrix:
  project: ["reqnroll.cloud.sln"]
  scenario: ["searchItems-1", "searchItems-2", "searchItems-3", "api"]

pre:
  - dotnet build -c Release

# Dependency caching for Windows
cacheKey: '{{ checksum "reqnroll.cloud.csproj" }}'

post:
  - cat yaml/mac/reqnroll_hyperexecute_matrix_sample.yaml

mergeArtifacts: true

uploadArtefacts:
 - name: Execution_Report
   path:
    - Report/**/
    - Reports/**/
 - name: Execution_Screenshots
   path:
    - Screenshots/**/**/
    - Reports/**/Screenshots/**/

report: true
partialReports:
  location: Report
  type: html
  frameworkName: reqnroll

#Parallel execution at feature level
#testSuites:
#  - dotnet test $project --filter Name~$feature
testSuites:
  - dotnet test --logger "console;verbosity=detailed" $project --filter "(Category=$scenario)"

jobLabel: [selenium-reqnroll, mac, matrix]